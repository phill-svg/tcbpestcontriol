<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Staff Chat | TCB Pest Control Canberra</title>
<meta content="noindex,nofollow" name="robots"/>
<link href="/favicon.ico" rel="icon" type="image/x-icon"/><link href="/assets/favicon/favicon-32x32.png" rel="icon" sizes="32x32" type="image/png"/><link href="/assets/favicon/favicon-16x16.png" rel="icon" sizes="16x16" type="image/png"/><link href="/assets/favicon/apple-touch-icon.png" rel="apple-touch-icon" sizes="180x180"/><link href="/staff-chat.webmanifest" rel="manifest"/>
<link href="/assets/css/style.css?v=19" rel="stylesheet"/>
</head>
<body class="staff-chat-body">
<div class="staff-chat-shell">
  <div class="staff-login" data-staff-login hidden>
    <div class="staff-login-card">
      <div class="staff-login-accent"></div>
      <div class="staff-login-body">
        <img alt="TCB Pest Control" class="staff-login-logo" height="42" src="/assets/images/tcb-pest-control-logo-03284.webp" width="100"/>
        <h1 class="staff-login-title" data-staff-login-title>Staff sign in</h1>
        <form class="form" data-staff-login-form>
        <div class="field">
          <label for="staff-username">Username</label>
          <input autocomplete="username" id="staff-username" name="username" required type="text"/>
        </div>
        <div class="field">
          <label for="staff-password" data-staff-password-label>Password</label>
          <input autocomplete="current-password" id="staff-password" name="password" required type="password"/>
        </div>
        <div class="field" data-staff-passcode-field hidden>
          <label for="staff-passcode">Setup passcode</label>
          <input autocomplete="off" id="staff-passcode" name="passcode" type="password"/>
        </div>
        <p class="staff-login-error" data-staff-login-error hidden></p>
        <div class="form-footer">
          <button class="btn btn-primary" data-staff-login-submit type="submit">Sign in</button>
        </div>
        </form>
      </div>
    </div>
  </div>
  <div class="staff-dashboard" data-staff-dashboard hidden>
    <div class="staff-dashboard-accent"></div>
    <div class="staff-dashboard-head">
      <div class="staff-dashboard-brand">
        <img alt="TCB Pest Control" class="staff-dashboard-logo" height="28" src="/assets/images/tcb-pest-control-logo-03284.webp" width="66"/>
        <h1 class="staff-login-title">Staff chat</h1>
      </div>
      <div class="staff-dashboard-head-actions">
        <button class="btn staff-logout-btn" data-staff-manage-toggle hidden type="button"><svg aria-hidden="true" class="icon" fill="none" height="15" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="15"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg><span>Manage staff</span></button>
        <button class="btn staff-logout-btn" data-staff-enable-push type="button"><svg aria-hidden="true" class="icon" fill="none" height="15" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="15"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg><span>Notifications</span></button>
        <button class="btn staff-logout-btn" data-staff-team-toggle type="button"><svg aria-hidden="true" class="icon" fill="none" height="15" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="15"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg><span>Team chat</span><span class="staff-team-toggle-badge" data-staff-team-toggle-badge hidden></span></button>
        <button class="btn staff-logout-btn" data-staff-logout type="button"><svg aria-hidden="true" class="icon" fill="none" height="15" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="15"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" x2="9" y1="12" y2="12"></line></svg><span>Sign out</span></button>
      </div>
    </div>
    <div class="staff-team-panel" data-staff-team-panel hidden>
      <div class="staff-team-rooms" data-staff-team-rooms></div>
      <div class="staff-team-thread" data-staff-team-thread hidden>
        <div class="staff-team-thread-head">
          <button class="staff-thread-back" data-staff-team-back type="button">&larr; Team chat</button>
          <span class="staff-team-thread-title" data-staff-team-thread-title></span>
        </div>
        <div class="chat-messages staff-team-messages" data-staff-team-messages></div>
        <form class="chat-input-row" data-staff-team-reply-form>
          <input aria-label="Message" autocomplete="off" class="chat-input" data-staff-team-reply-input maxlength="2000" placeholder="Type a message..." required type="text"/>
          <button class="btn btn-primary chat-send" type="submit">Send</button>
        </form>
      </div>
    </div>
    <div class="staff-manage-panel" data-staff-manage-panel hidden>
      <div class="staff-manage-list" data-staff-manage-list></div>
      <form class="form staff-manage-add-form" data-staff-add-form>
        <div class="field">
          <label for="staff-new-username">Username</label>
          <input autocomplete="off" id="staff-new-username" name="username" required type="text"/>
        </div>
        <div class="field">
          <label for="staff-new-password">Temporary password</label>
          <input autocomplete="off" id="staff-new-password" name="password" required type="password"/>
        </div>
        <label class="staff-manage-admin-check">
          <input data-staff-new-is-admin type="checkbox"/>
          Give this account admin (can manage other staff)
        </label>
        <p class="staff-manage-error" data-staff-manage-error hidden></p>
        <div class="form-footer">
          <button class="btn btn-primary" type="submit">Add staff member</button>
        </div>
      </form>
    </div>
    <div class="staff-chat-layout">
      <div class="staff-conv-pane">
        <div class="staff-conv-tabs">
          <button class="staff-conv-tab is-active" data-staff-conv-tab="open" type="button">Open <span class="staff-conv-tab-count" data-staff-conv-tab-count>0</span></button>
          <button class="staff-conv-tab" data-staff-conv-tab="closed" type="button">Closed <span class="staff-conv-tab-count" data-staff-conv-tab-count>0</span></button>
        </div>
        <div class="staff-conv-list" data-staff-conv-list>
          <div class="staff-conv-empty">
            <svg aria-hidden="true" class="icon" fill="none" height="30" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" viewBox="0 0 24 24" width="30"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>
            <p>No open conversations.</p>
          </div>
        </div>
      </div>
      <div class="staff-thread">
        <div class="staff-thread-placeholder" data-staff-thread-placeholder>
          <svg aria-hidden="true" class="icon" fill="none" height="34" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" viewBox="0 0 24 24" width="34"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>
          <p>Select a conversation to view messages.</p>
        </div>
        <div class="staff-thread-active" data-staff-thread-active hidden>
          <div class="staff-thread-head">
            <button class="staff-thread-back" data-staff-thread-back type="button">&larr; Conversations</button>
            <span class="staff-thread-avatar" data-staff-thread-avatar></span>
            <span class="staff-thread-visitor" data-staff-thread-visitor></span>
            <button class="staff-thread-status-btn" data-staff-thread-status-toggle type="button"></button>
          </div>
          <div class="chat-messages staff-thread-messages" data-staff-thread-messages></div>
          <form class="chat-input-row" data-staff-reply-form>
            <input aria-label="Reply" autocomplete="off" class="chat-input" data-staff-reply-input maxlength="2000" placeholder="Type a reply..." required type="text"/>
            <button class="btn btn-primary chat-send" type="submit">Send</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="/assets/js/chat-admin.js"></script>
</body>
</html>
